services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: etax-postgres
    environment:
      POSTGRES_DB: etax
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - etax-network

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: etax-backend
    env_file:
      - ../backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: etax
      PORT: 8080
      JWT_SECRET: test_jwt_secret_key_for_development_at_least_32_chars
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - etax-network

  # Frontend (commented out for separate development)
  # frontend:
  #   build:
  #     context: ../frontend
  #     dockerfile: Dockerfile
  #   container_name: etax-frontend
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8080
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend
  #   networks:
  #     - etax-network
  #   volumes:
  #     - ../frontend:/app
  #     - /app/node_modules

volumes:
  postgres_data:

networks:
  etax-network:
    driver: bridge
