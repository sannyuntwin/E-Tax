services:
  # PostgreSQL Database
  - type: pserv
    name: etax-db
    env: docker
    repo: https://github.com/render-examples/postgres
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: POSTGRES_DB
        value: etax
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        generateValue: true
    disk:
      name: etax-db-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10

  # Backend API
  - type: web
    name: etax-api
    env: go
    repo: https://github.com/sannyuntwin/E-Tax
    rootDir: backend
    buildCommand: go mod download && go build -o bin/main .
    startCommand: ./bin/main
    envVars:
      - key: PORT
        value: 10000
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: postgresql://etax_postgres_user:Gc2Vih7QuHTOu8lb0TTy0h24OyEa2UPX@dpg-d6das8bh46gs73cumut0-a/etax_postgres
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://e-tax.vercel.app,http://localhost:3000
      - key: RATE_LIMIT_REQUESTS
        value: 100
      - key: RATE_LIMIT_WINDOW
        value: 20
      - key: DB_MAX_OPEN_CONNS
        value: 25
      - key: DB_MAX_IDLE_CONNS
        value: 10
      - key: DB_CONN_MAX_LIFETIME
        value: 300
    healthCheckPath: /health
